      type: object
      required: [id, title, description, difficulty, startTime, endTime, isActive, totalParticipants, createdAt, problems, leaderboard]
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        difficulty:
          type: string
        startTime:
          type: string
        endTime:
          type: string
        isActive:
          type: boolean
        prizeDescription:
          type: ["string", "null"]
        totalParticipants:
          type: integer
        createdAt:
          type: string
        status:
          type: string
        myEntry:
          $ref: "#/components/schemas/MathContestEntry"
        problems:
          type: array
          items:
            $ref: "#/components/schemas/MathProblem"
        leaderboard:
          type: array
          items:
            $ref: "#/components/schemas/MathContestEntry"

    MathContestEntry:
      type: object
      required: [id, contestId, userId, userName, score, solutionsCount, joinedAt]
      properties:
        id:
          type: integer
        contestId:
          type: integer
        userId:
          type: string
        userName:
          type: string
        score:
          type: integer
        solutionsCount:
          type: integer
        rank:
          type: ["integer", "null"]
        joinedAt:
          type: string
        lastSubmittedAt:
          type: ["string", "null"]

    MathContestInput:
      type: object
      required: [title, description, startTime, endTime]
      properties:
        title:
          type: string
        description:
          type: string
        difficulty:
          type: string
          enum: [beginner, intermediate, advanced, olympiad]
          default: intermediate
        startTime:
          type: string
        endTime:
          type: string
        prizeDescription:
          type: string
        problemIds:
          type: array
          items:
            type: integer

    MathAnnotation:
      type: object
      required: [id, solutionId, problemId, userId, userName, body, createdAt]
      properties:
        id:
          type: integer
        solutionId:
          type: integer
        problemId:
          type: integer
        userId:
          type: string
        userName:
          type: string
        body:
          type: string
        selectionStart:
          type: ["integer", "null"]
        selectionEnd:
          type: ["integer", "null"]
        status:
          type: string
        createdAt:
          type: string

    MathAnnotationInput:
      type: object
      required: [problemId, body]
      properties:
        problemId:
          type: integer
        solutionId:
          type: integer
        body:
          type: string
        selectionStart:
          type: integer
        selectionEnd:
          type: integer

    MathBookmark:
      type: object
      required: [id, userId, problemId, listName, createdAt, problem]
      properties:
        id:
          type: integer
        userId:
          type: string
        problemId:
          type: integer
        note:
          type: ["string", "null"]
        listName:
          type: string
        createdAt:
          type: string
        problem:
          $ref: "#/components/schemas/MathProblem"

    MathBookmarkInput:
      type: object
      required: [problemId]
      properties:
        problemId:
          type: integer
        note:
          type: string
        listName:
          type: string

    MathDifficultyRatingInput:
      type: object
      required: [rating]
      properties:
        rating:
          type: integer
          minimum: 1
          maximum: 5

    MathDifficultyStats:
      type: object
      required: [average, voteCount, distribution]
      properties:
        average:
          type: ["number", "null"]
        voteCount:
          type: integer
        distribution:
          type: object
          additionalProperties:
            type: integer
        myVote:
          type: ["integer", "null"]

    EleganceDebateResult:
      type: object
      required: [debateId]
      properties:
        debateId:
          type: integer

    MathNotification:
      type: object
      required: [id, userId, type, title, body, isRead, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: string
        type:
          type: string
        title:
          type: string
        body:
          type: string
        targetType:
          type: ["string", "null"]
        targetId:
          type: ["integer", "null"]
        fromUserId:
          type: ["string", "null"]
        fromUserName:
          type: ["string", "null"]
        isRead:
          type: boolean
        createdAt:
          type: string
