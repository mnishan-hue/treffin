        title:
          type: string
        excerpt:
          type: ["string", "null"]
        content:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]
        authorId:
          type: integer
        authorName:
          type: string
        authorTitle:
          type: string
        authorAvatar:
          type: ["string", "null"]
        category:
          type: ["string", "null"]
        readTime:
          type: integer
        likes:
          type: integer
        liked:
          type: boolean
        isVerified:
          type: boolean
        createdAt:
          type: string
        isTrending:
          type: boolean
        isFeatured:
          type: boolean
        isExpertReviewed:
          type: boolean
        reviewRequestStatus:
          type: ["string", "null"]
        editedAt:
          type: ["string", "null"]
        isRemoved:
          type: boolean
        status:
          type: string

    ArticleInput:
