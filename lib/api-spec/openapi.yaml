          type: integer
        title:
          type: string
        participantCount:
          type: integer
        rank:
          type: integer
        trend:
          type: string
          enum: [up, down, stable]
        dailyVotes:
          type: array
          items:
            type: integer
          description: Vote counts for the last 7 days oldest-first
        endsAt:
          type: ["string", "null"]
          format: date-time
          description: ISO 8601 timestamp when this debate closes, or null if open-ended

    DebateInput:
      type: object
      required: [title, category]
      properties:
        title:
          type: string
        description:
          type: string
        category:
          type: string

