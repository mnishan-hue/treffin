components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    FeedPost:
      type: object
      required: [id, type, authorId, authorName, authorTitle, authorAvatar, createdAt, likes, comments, reposts]
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [opinion, article, knowledge, debate_highlight, quote]
        authorId:
          type: integer
        authorName:
          type: string
        authorTitle:
          type: string
        authorAvatar:
          type: ["string", "null"]
        isVerified:
          type: boolean
        createdAt:
          type: string
        content:
          type: ["string", "null"]
        title:
          type: ["string", "null"]
        excerpt:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]
        topic:
          type: ["string", "null"]
        readTime:
          type: ["integer", "null"]
        likes:
          type: integer
        comments:
          type: integer
        reposts:
          type: integer
        saved:
          type: boolean
        isAnonymous:
          type: boolean
        isOwner:
          type: boolean
        liked:
          type: boolean

    Debate:
      type: object
      required: [id, title, category, supportPercent, againstPercent, participantCount, isLive]
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: ["string", "null"]
        category:
          type: string
        supportPercent:
          type: integer
        againstPercent:
          type: integer
        participantCount:
          type: integer
        isLive:
          type: boolean
        imageUrl:
          type: ["string", "null"]
        rank:
          type: ["integer", "null"]
        isTrending:
          type: boolean
        isFeatured:
          type: boolean
        endsAt:
          type: ["string", "null"]
          format: date-time
          description: ISO 8601 timestamp when this debate closes, or null if open-ended
        isFrozen:
          type: boolean
        frozenReason:
          type: ["string", "null"]
        isAnonymous:
          type: boolean
        sourcesRequired:
          type: boolean
        closingArgMinHours:
          type: integer
        contentWarning:
          type: ["string", "null"]
        healthScore:
          type: integer

