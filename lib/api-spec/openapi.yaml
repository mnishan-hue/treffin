openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Treffin API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: feed
    description: Feed operations
  - name: debates
    description: Debate operations
  - name: articles
    description: Article operations
  - name: users
    description: User operations
  - name: topics
    description: Topic operations
  - name: stats
    description: Stats and aggregates
  - name: communities
    description: Community operations
  - name: reputation
    description: Reputation operations
  - name: admin
    description: Admin operations
  - name: notifications
    description: Notification operations
  - name: search
    description: Global search
  - name: math
    description: Treffin Mathematics operations
paths:
  /search:
    get:
      operationId: globalSearch
      tags: [search]
      summary: Global search across debates, articles, users, communities
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResults"

  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /feed:
    get:
      operationId: getFeed
      tags: [feed]
      summary: Get home feed posts
      parameters:
        - name: tab
          in: query
          schema:
            type: string
            enum: [for_you, following, debates, articles, communities]
          required: false
        - name: page
          in: query
          schema:
            type: integer
          required: false
        - name: authorId
          in: query
          schema:
            type: integer
          required: false
      responses:
        "200":
          description: Feed posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FeedPost"

  /debates:
    get:
      operationId: getDebates
      tags: [debates]
      summary: Get list of debates
      parameters:
        - name: category
          in: query
          schema:
            type: string
          required: false
      responses:
        "200":
          description: Debates list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Debate"
    post:
      operationId: createDebate
      tags: [debates]
      summary: Create a new debate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DebateInput"
      responses:
        "201":
          description: Created debate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Debate"

  /debates/trending:
    get:
      operationId: getTrendingDebates
      tags: [debates]
      summary: Get trending debates for sidebar
      responses:
        "200":
          description: Trending debates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TrendingDebate"

  /debates/{id}:
    get:
      operationId: getDebate
      tags: [debates]
      summary: Get debate by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Debate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Debate"

  /debates/{id}/my-vote:
    get:
      operationId: getMyDebateVote
      tags: [debates]
      summary: Get the authenticated user's vote on a debate
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User's current vote or null if not voted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MyVote"

  /debates/{id}/vote:
    post:
      operationId: voteDebate
      tags: [debates]
      summary: Vote on a debate
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VoteInput"
      responses:
        "200":
          description: Updated vote counts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Debate"

  /articles:
    get:
      operationId: getArticles
      tags: [articles]
      summary: Get list of articles
      parameters:
        - name: category
          in: query
          required: false
          schema:
            type: string
        - name: sort
          in: query
          required: false
          schema:
            type: string
            enum: [trending, newest, most_liked]
      responses:
        "200":
          description: Articles list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Article"
    post:
      operationId: createArticle
      tags: [articles]
      summary: Create a new article
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ArticleInput"
      responses:
        "201":
          description: Created article
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Article"

  /articles/{id}:
    get:
      operationId: getArticle
      tags: [articles]
      summary: Get article by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Article
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Article"

  /articles/{id}/annotations:
    get:
      operationId: getArticleAnnotations
      tags: [articles]
      summary: Get annotations for an article
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of annotations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Annotation"
    post:
      operationId: createAnnotation
      tags: [articles]
      summary: Create an annotation on an article
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnnotationInput"
      responses:
        "201":
          description: Created annotation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Annotation"
        "401":
          description: Unauthorized

  /annotations/{id}:
    delete:
      operationId: deleteAnnotation
      tags: [articles]
      summary: Delete an annotation (owner or article author)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                required: [success]
                properties:
                  success:
                    type: boolean
        "403":
          description: Forbidden
        "404":
          description: Not found

  /users/top-thinkers:
    get:
      operationId: getTopThinkers
      tags: [users]
      summary: Get top thinkers leaderboard
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [this_week, this_month, all_time]
          required: false
      responses:
        "200":
          description: Top thinkers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TopThinker"

  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get user profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /users/{id}/positions:
    get:
      operationId: getUserPositions
      tags: [users]
      summary: Get all positions for a user grouped by topic (public)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User positions grouped by topic, newest first within each group
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserPositionGroup"
        "404":
          description: User not found

  /users/me/positions:
    post:
      operationId: createUserPosition
      tags: [users]
      summary: Declare a new position (authenticated)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserPositionInput"
      responses:
        "201":
          description: Created position
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPosition"
        "401":
          description: Unauthorized

  /users/me/interests:
    patch:
      operationId: updateUserInterests
      tags: [users]
      summary: Save the authenticated user's interest domains
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserInterestsInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok:
                    type: boolean
        "400":
          description: Invalid interests
        "401":
          description: Unauthorized

  /users/{id}/dna:
    get:
      operationId: getUserDna
      tags: [users]
      summary: Get user intellectual DNA domain scores
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Intellectual DNA domain scores
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DomainScore"
        "404":
          description: User not found

  /users/{id}/debate-history:
    get:
      operationId: getUserDebateHistory
      tags: [users]
      summary: Get debates a user has voted in, with their side
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Debate participation history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DebateHistoryEntry"
        "404":
          description: User not found

  /topics:
    get:
      operationId: getTopics
      tags: [topics]
      summary: Get available topics
      responses:
        "200":
          description: Topics list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Topic"

  /stats/daily-question:
    get:
      operationId: getDailyQuestion
      tags: [stats]
      summary: Get daily big question for the hero banner
      responses:
        "200":
          description: Daily question with debate stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyQuestion"

  /stats/weekly-challenge:
    get:
      operationId: getWeeklyChallenge
      tags: [stats]
      summary: Get active weekly challenge
      responses:
        "200":
          description: Active weekly challenge
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeeklyChallenge"

  /stats/daily-question/vote:
    post:
      operationId: voteDailyQuestion
      tags: [stats]
      summary: Cast a vote on the active daily question
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DailyQuestionVoteInput"
      responses:
        "200":
          description: Vote recorded, returns updated question stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyQuestion"
        "409":
          description: Already voted on this question

  /stats/weekly-challenge/submit:
    post:
      operationId: submitWeeklyChallenge
      tags: [stats]
      summary: Submit a response to the active weekly challenge
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WeeklyChallengeSubmissionInput"
      responses:
        "200":
          description: Submission recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeeklyChallengeSubmission"
        "409":
          description: Already submitted to this challenge

  /posts:
    post:
      operationId: createPost
      tags: [feed]
      summary: Create a new post/thought
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostInput"
      responses:
        "201":
          description: Created post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedPost"

  /communities:
    get:
      operationId: getCommunities
      tags: [communities]
      summary: Get list of communities
      responses:
        "200":
          description: Communities list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Community"
    post:
      operationId: createCommunity
      tags: [communities]
      summary: Create a new community
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommunityInput"
      responses:
        "201":
          description: Created community
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Community"

  /communities/{id}:
    get:
      operationId: getCommunity
      tags: [communities]
      summary: Get community by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Community detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommunityDetail"

  /communities/{id}/rules:
    patch:
      operationId: updateCommunityRules
      tags: [communities]
      summary: Update community rules (creator only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommunityRulesInput"
      responses:
        "200":
          description: Updated community
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommunityDetail"
        "403":
          description: Not the creator
        "404":
          description: Community not found

  /communities/{id}/join:
    post:
      operationId: joinCommunity
      tags: [communities]
      summary: Join a community
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Join result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommunityMembershipResult"

  /communities/{id}/leave:
    delete:
      operationId: leaveCommunity
      tags: [communities]
      summary: Leave a community
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Leave result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommunityMembershipResult"

  /communities/{id}/requests:
    get:
      operationId: getCommunityJoinRequests
      tags: [communities]
      summary: Get pending join requests for a private community (creator only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Pending join requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CommunityJoinRequest"

  /communities/{id}/requests/{userId}/approve:
    post:
      operationId: approveCommunityJoinRequest
      tags: [communities]
      summary: Approve a pending join request (creator only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Approved
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok:
                    type: boolean

  /communities/{id}/requests/{userId}/deny:
    delete:
      operationId: denyCommunityJoinRequest
      tags: [communities]
      summary: Deny a pending join request (creator only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Denied
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok:
                    type: boolean

  /communities/{id}/posts:
    get:
      operationId: getCommunityPosts
      tags: [communities]
      summary: Get posts for a community
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Community posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FeedPost"
    post:
      operationId: createCommunityPost
      tags: [communities]
      summary: Create a post in a community
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostInput"
      responses:
        "201":
          description: Created post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedPost"

  /reputation:
    get:
      operationId: getReputation
      tags: [reputation]
      summary: Get current user's reputation summary and history
      responses:
        "200":
          description: Reputation summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReputationSummary"
        "401":
          description: Unauthorized

  /reputation/award:
    post:
      operationId: awardReputation
      tags: [reputation]
      summary: Award reputation points for an action
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RepAwardInput"
      responses:
        "200":
          description: Award recorded
          content:
            application/json:
              schema:
                type: object
                required: [total]
                properties:
                  total:
                    type: integer
        "401":
          description: Unauthorized

  /notifications:
    get:
      operationId: getNotifications
      tags: [notifications]
      summary: Get current user's notifications
      responses:
        "200":
          description: Notifications list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"
        "401":
          description: Unauthorized

  /notifications/read-all:
    patch:
      operationId: markAllNotificationsRead
      tags: [notifications]
      summary: Mark all notifications as read
      responses:
        "200":
          description: All marked read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationOk"
        "401":
          description: Unauthorized

  /notifications/{id}/read:
    patch:
      operationId: markNotificationRead
      tags: [notifications]
      summary: Mark a single notification as read
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Marked read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationOk"
        "401":
          description: Unauthorized
        "404":
          description: Not found

  /posts/{id}/reveal:
    patch:
      operationId: revealPost
      tags: [feed]
      summary: Reveal the author identity of an anonymous post (owner only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated post with identity revealed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedPost"
        "403":
          description: Not the post owner
        "404":
          description: Post not found

  /posts/{id}/like:
    post:
      operationId: likePost
      tags: [feed]
      summary: Like or unlike a post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedPost"

  /posts/{id}/comments:
    get:
      operationId: getPostComments
      tags: [feed]
      summary: Get comments for a post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Post comments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DebateComment"
        "404":
          description: Post not found
    post:
      operationId: createPostComment
      tags: [feed]
      summary: Post a comment on a post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DebateCommentInput"
      responses:
        "201":
          description: Created comment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DebateComment"
        "404":
          description: Post not found

  /posts/{id}/report:
    post:
      operationId: reportPost
      tags: [feed]
      summary: Report a post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostReportInput"
      responses:
        "200":
          description: Report recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminOk"
        "404":
          description: Post not found

  /posts/{id}/comments/{commentId}/like:
    post:
      operationId: likePostComment
      tags: [feed]
      summary: Toggle like on a community post comment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: commentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated like state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommentLikeToggle"
        "401":
          description: Not authenticated
        "404":
          description: Comment not found

  /posts/{id}/comments/{commentId}:
    delete:
      operationId: deletePostComment
      tags: [feed]
      summary: Delete a comment on a post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: commentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminOk"
        "404":
          description: Comment not found

  /articles/{id}/like:
    post:
      operationId: likeArticle
      tags: [articles]
      summary: Like an article
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated article
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Article"
        "404":
          description: Article not found

  /articles/{id}/comments:
    post:
      operationId: createArticleComment
      tags: [articles]
      summary: Post a comment on an article
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DebateCommentInput"
      responses:
        "201":
          description: Created comment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DebateComment"
        "404":
          description: Article not found

  /users/me:
    get:
      operationId: getCurrentUser
      tags: [users]
      summary: Get the current authenticated user's DB profile
