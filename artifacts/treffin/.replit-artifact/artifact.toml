kind = "web"
previewPath = "/"
title = "Treffin"
version = "1.0.0"
id = "artifacts/treffin"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18962

[services.development]
run = "pnpm --filter @workspace/treffin run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/treffin", "run", "build" ]
publicDir = "artifacts/treffin/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18962"
BASE_PATH = "/"
