<svg width="200" height="240" viewBox="0 0 200 240" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Right arm: upper-right → lower-left, lighter purple/lavender -->
    <linearGradient id="gR" x1="170" y1="24" x2="80" y2="142" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#C4A0FF"/>
      <stop offset="50%" stop-color="#9B5CF0"/>
      <stop offset="100%" stop-color="#7040D0"/>
    </linearGradient>
    <!-- Left arm: upper-left → lower-right, vivid purple/magenta -->
    <linearGradient id="gL" x1="22" y1="32" x2="122" y2="188" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#C040FF"/>
      <stop offset="50%" stop-color="#8B28E0"/>
      <stop offset="100%" stop-color="#5A1BB0"/>
    </linearGradient>
    <!-- Stem: blue -->
    <linearGradient id="gS" x1="95" y1="93" x2="95" y2="232" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4888FF"/>
      <stop offset="100%" stop-color="#1545E8"/>
    </linearGradient>
    <!-- Dark crossing blend -->
    <radialGradient id="gX" cx="90" cy="99" r="38" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#180840" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#180840" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Right arm: upper-right → lower-left -->
  <line x1="170" y1="24" x2="80" y2="142"
    stroke="url(#gR)" stroke-width="52" stroke-linecap="round"/>

  <!-- Left arm: upper-left → lower-right -->
  <line x1="22" y1="32" x2="122" y2="188"
    stroke="url(#gL)" stroke-width="52" stroke-linecap="round"/>

  <!-- Crossing shadow at junction -->
  <ellipse cx="90" cy="99" rx="33" ry="32" fill="url(#gX)"/>

  <!-- Stem: straight down, blue -->
  <line x1="95" y1="93" x2="95" y2="232"
    stroke="url(#gS)" stroke-width="38" stroke-linecap="round"/>
</svg>
